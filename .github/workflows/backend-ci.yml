name: Backend CI

on:
  push:
  pull_request:

jobs:
  backend-checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: legal_case_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d legal_case_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: development
      POSTGRES_SERVER: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: legal_case_ci
      SECRET_KEY: ci-secret-key-0123456789
      WECHAT_IDENTITY_ENCRYPTION_SECRET: ci-wechat-encryption-secret-0123456789
      WECHAT_IDENTITY_HASH_SECRET: ci-wechat-hash-secret-0123456789

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Verify production runtime guards
        run: pytest tests/test_runtime_config_guards.py -q

      - name: Check router boundaries
        run: python ../scripts/check-router-boundaries.py

      - name: Check auth repository boundaries
        run: python ../scripts/check-auth-repository-boundaries.py

      - name: Check schema boundaries
        run: python ../scripts/check-schema-boundaries.py

      - name: Check service size threshold (warning only)
        run: python ../scripts/check-service-size-threshold.py --threshold 280

      - name: Run backend test suite
        run: pytest tests -q

      - name: Verify Alembic migrations
        run: alembic upgrade head
