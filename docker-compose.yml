services:
  postgres:
    image: postgres:17
    container_name: legal-postgres
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: legal-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: legal-backend
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/storage:/app/storage
    ports:
      - "8000:8000"

  web-frontend:
    build:
      context: ./web-frontend
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: legal-web
    depends_on:
      - backend
    ports:
      - "8080:80"

  nginx:
    image: nginx:1.27-alpine
    container_name: legal-nginx
    depends_on:
      - backend
      - web-frontend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
